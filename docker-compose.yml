version: '3.8'

services:
  backend:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
      - /app/__pycache__  # Prevent permission issues
    environment:
      - DOCKER_CONTAINER=True
      - DEBUG=True
      - PYTHONUNBUFFERED=1
      - EMAIL_BACKEND=django.core.mail.backends.console.EmailBackend
      - ALLOWED_HOSTS=localhost,127.0.0.1,192.168.100.212
      - CORS_ALLOWED_ORIGINS=http://localhost:3000,http://192.168.100.212:3000,http://192.168.100.212:19000
    ports:
      - "8000:8000"
    env_file:
      - .env.docker
    extra_hosts:
      # Allows container to connect to host machine
      - "host.docker.internal:host-gateway"
    # For Mac/Windows, also add:
    # platform: linux/amd64

volumes:
  .: